apiVersion: apps/v1
kind: Deployment
metadata:
  name: colosseum-rwd
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: colosseum-rwd
  template:
    metadata:
      labels:
        app: colosseum-rwd
    spec:
      containers:
      - name: colosseum-rwd
        image: {{ .Values.global.image.registry }}/colosseum-rwd:log
        imagePullPolicy: Always
        resources:
          requests:
            memory: "256Mi"
            cpu: "128m"
          limits:
            memory: "256Mi"
            cpu: "128m"
        env:
        - name: PORT
          value: "8084"
        - name: REDIS_HOST
          value: redis.{{- .Release.Namespace -}}.svc.cluster.local
        - name: REDIS_PORT
          value: "6379"
        ports:
        - containerPort: 8084
        startupProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - echo "waiting for redis manually" 
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10